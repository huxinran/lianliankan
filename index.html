<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>连连看 · Lianliankan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===================== HOME SCREEN ===================== -->
  <section id="home" class="screen home">
    <div id="setGrid" class="set-grid"></div>
    <select id="diffSelect" class="diff-select">
      <option value="easy">简单</option>
      <option value="normal" selected>普通</option>
      <option value="hard">困难</option>
    </select>
  </section>

  <!-- ===================== GAME SCREEN ===================== -->
  <section id="game" class="screen app hidden">
    <header class="topbar">
      <h1 id="gameTitle">连连看</h1>
      <div class="stats">
        <span class="stat">⏱ <b id="time">00:00</b></span>
        <span class="stat">🀄 剩余 <b id="remaining">0</b></span>
        <span class="stat">💡 提示 <b id="hints">5</b></span>
        <span class="stat">🔀 洗牌 <b id="shuffles">3</b></span>
      </div>
    </header>

    <div class="controls">
      <button id="homeBtn">← 主页</button>
      <button id="newGame">新游戏</button>
      <button id="hintBtn">提示</button>
      <button id="shuffleBtn">洗牌</button>
    </div>

    <div id="boardWrap" class="board-wrap">
      <div id="board" class="board"></div>
      <svg id="linkLayer" class="link-layer"></svg>
      <div id="message" class="message"></div>
    </div>
  </section>

  <!-- ===================== WIN OVERLAY ===================== -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-card">
      <h2 id="overlayTitle">🎉 通关！</h2>
      <p id="overlaySub"></p>
      <div class="overlay-actions">
        <button id="overlayAgain">再来一局</button>
        <button id="overlayHome" class="ghost">选图案</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/pathfinder.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
